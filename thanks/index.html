<!doctype html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Thank You!</title>

<style>
body{
margin:0;
font-family:system-ui;
background:linear-gradient(135deg,#ffe5ec,#fff1f5);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
text-align:center;
}
.card{
background:white;
padding:34px;
border-radius:24px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
max-width:560px;
width:100%;
}
.btn{
display:inline-block;
padding:12px 16px;
border-radius:14px;
background:#ff8fab;
color:white;
text-decoration:none;
font-weight:700;
margin-top:18px;
}
</style>
</head>

<body>
<div class="card">
<h1 id="title">Thank You!</h1>
<p id="message">Your RSVP has been received.</p>
<div id="names"></div>
<a class="btn" href="/">Back to Invite</a>
</div>

<script>
const attending=localStorage.getItem("attendingValue");
const storedNames=localStorage.getItem("attendeeNames");

const title=document.getElementById("title");
const message=document.getElementById("message");
const namesEl=document.getElementById("names");

let names=[];
if(storedNames){
try{ names=JSON.parse(storedNames);}catch{}
}

if(names.length>0){
namesEl.innerHTML="<b>Thank you, "+names.join(", ")+"!</b>";
}

if(attending==="Yes"){
title.innerHTML="🎉 Yay! Thank You!";
message.innerHTML="We’re so happy you’re joining us!";
}else if(attending==="No"){
title.innerHTML="😔 We’ll Miss You";
message.innerHTML="We’re sad you can’t make it!";
}

/* ✅ QUICK FIX: clear after 5 minutes instead of instantly */
setTimeout(()=>{
localStorage.removeItem("attendeeNames");
localStorage.removeItem("attendingValue");
},300000);
</script>
</body>
</html>
