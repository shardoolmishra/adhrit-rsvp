<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Welcome 🎉</title>

<style>
  html, body {
    margin: 0;
    height: 100%;
    background: black;
    overflow: hidden;
    position: relative; /* Needed to place balloons on top of video */
  }

  video {
    position: fixed; /* Keep video locked to the screen dimensions */
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: black;
    z-index: 1; /* Video sits at the bottom */
  }

  /* Tap to unmute overlay */
  #unmuteOverlay {
    position: fixed;
    inset: 0;
    z-index: 10; /* Keep overlay above balloons and video */
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 20px;
    background: rgba(0,0,0,0.4);
    cursor: pointer;
  }

  #skipBtn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10; /* Keep button above everything */
    padding: 10px 16px;
    border: none;
    background: rgba(0,0,0,0.6);
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-family: sans-serif;
  }

  /* ========================================= */
  /* 🎈 BALLOON STYLES (From rsvp.html) 🎈 */
  /* ========================================= */
  
  .balloons {
    position: fixed;
    inset: 0;
    z-index: 5; /* Balloons float above the video, below UI */
    overflow: hidden;
    pointer-events: none; /* User clicks pass through to video/UI */
    opacity: 0; /* Hidden by default */
    transition: opacity 1s ease; /* Fade in when activated */
  }

  /* This class is added by JavaScript */
  .balloons.active {
    opacity: 1;
  }

  .balloon {
    position: absolute;
    bottom: -180px;
    width: 95px;
    height: 120px;
    border-radius: 50% 50% 45% 45%;
    opacity: 0.85;
    animation: floatUp linear infinite;
  }

  .balloon::before {
    content: "";
    position: absolute;
    bottom: -55px;
    left: 50%;
    width: 2px;
    height: 60px;
    background: rgba(255,255,255,0.7);
    transform: translateX(-50%);
  }

  .balloon::after {
    content: "";
    position: absolute;
    bottom: -6px;
    left: 50%;
    width: 12px;
    height: 12px;
    background: inherit;
    transform: translateX(-50%) rotate(45deg);
  }

  .balloon1 { left: 8%; background: #ff8fab; animation-duration: 7s; }
  .balloon2 { left: 22%; background: #ffd166; animation-duration: 9s; animation-delay: 1s; }
  .balloon3 { left: 40%; background: #90e0ef; animation-duration: 8s; animation-delay: .5s; }
  .balloon4 { left: 62%; background: #cdb4db; animation-duration: 10s; animation-delay: 2s; }
  .balloon5 { left: 78%; background: #95d5b2; animation-duration: 7.5s; animation-delay: 1.5s; }
  .balloon6 { left: 90%; background: #f9bec7; animation-duration: 9.5s; animation-delay: 2.5s; }

  @keyframes floatUp {
    0% { transform: translateY(0); opacity: 0; }
    10% { opacity: 0.9; }
    50% { transform: translateY(-50vh) translateX(30px); }
    100% { transform: translateY(-120vh) translateX(-30px); opacity: 0; }
  }
</style>
</head>

<body>

  <video id="introVideo" autoplay muted playsinline>
    <source src="video/RSVP-Adhrit.mp4" type="video/mp4">
  </video>

  <div id="unmuteOverlay">🔊 Tap to hear sound</div>

  <button id="skipBtn">Skip ➡️</button>

  <div class="balloons" id="balloonContainer">
    <div class="balloon balloon1"></div>
    <div class="balloon balloon2"></div>
    <div class="balloon balloon3"></div>
    <div class="balloon balloon4"></div>
    <div class="balloon balloon5"></div>
    <div class="balloon balloon6"></div>
  </div>

<script>
const video = document.getElementById("introVideo");
const overlay = document.getElementById("unmuteOverlay");
const balloons = document.getElementById("balloonContainer");

video.onended = goToInvite;
document.getElementById("skipBtn").onclick = goToInvite;

// Unmute on tap
overlay.addEventListener("click", () => {
  video.muted = false;
  video.play();
  overlay.style.display = "none";
});

// ===========================================
// 🎈 Balloon Trigger Logic 🎈
// ===========================================
video.addEventListener('playing', () => {
    // Wait 10 seconds (10,000 milliseconds)
    setTimeout(() => {
        // Add the 'active' class to fade them in
        balloons.classList.add("active");
    }, 10000); 
}, { once: true }); // Ensure this only triggers once when the video starts


function goToInvite() {
  document.body.style.transition = "opacity 1s";
  document.body.style.opacity = 0;

  setTimeout(() => {
    // Navigate to the next page
    window.location.href = "rsvp.html";
  }, 500);
}
</script>

</body>
</html>
