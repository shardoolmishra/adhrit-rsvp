<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Welcome 🎉</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  width: 100%;
  height: 100%;
  object-fit: contain; /* ✅ FIXED */
  background: black;
}

/* Tap to unmute overlay */
#unmuteOverlay {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 20px;
  background: rgba(0,0,0,0.4);
  cursor: pointer;
}

#skipBtn {
  position: absolute;
  top: 20px;
  right: 20px;
  padding: 10px 16px;
  border: none;
  background: rgba(0,0,0,0.6);
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<video id="introVideo" autoplay muted playsinline>
  <source src="video/RSVP-Adhrit.mp4" type="video/mp4">
</video>

<div id="unmuteOverlay">🔊 Tap to hear sound</div>

<button id="skipBtn">Skip ➡️</button>

<script>
const video = document.getElementById("introVideo");
const overlay = document.getElementById("unmuteOverlay");

video.onended = goToInvite;
document.getElementById("skipBtn").onclick = goToInvite;

// Unmute on tap
overlay.addEventListener("click", () => {
  video.muted = false;
  video.play();
  overlay.style.display = "none";
});

function goToInvite() {
  document.body.style.transition = "opacity 1s";
  document.body.style.opacity = 0;

  setTimeout(() => {
    window.location.href = "rsvp.html";
  }, 1000);
}
</script>

</body>
</html>
